name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # =============================================================
  # Lint + format check — fast fail on style issues
  # =============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests

  # =============================================================
  # Typecheck — mypy strict
  # =============================================================
  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: pip install -e ".[dev,redis]"
      - name: Mypy
        run: mypy src/

  # =============================================================
  # Tests — Python 3.10 / 3.11 / 3.12 matrix
  # =============================================================
  test:
    name: Tests (Py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ matrix.python-version }} }
      - name: Install
        run: pip install -e ".[dev,redis]"
      - name: Run unit + property tests
        run: pytest tests/unit tests/property --cov --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # =============================================================
  # Build container image — verifies Dockerfile works
  # =============================================================
  docker:
    name: Build container
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: malaysia-data-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================
  # Security scan — pip-audit + bandit
  # =============================================================
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install audit tooling
        run: pip install pip-audit bandit
      - name: pip-audit
        run: |
          pip install -e .
          pip-audit --strict
      - name: bandit
        run: bandit -r src/ -ll
