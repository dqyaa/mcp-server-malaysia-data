name: Upstream Contract Check

on:
  schedule:
    # Run daily at 02:00 UTC = 10:00 KL time
    - cron: "0 2 * * *"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  issues: write  # to file issues if contracts break

jobs:
  contract:
    name: Verify upstream API contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run contract tests
        id: contract
        run: pytest tests/contract -m contract -v
        continue-on-error: true

      - name: File issue on contract failure
        if: steps.contract.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[contract] Upstream API drift detected ${new Date().toISOString().split('T')[0]}`;
            const body = `One or more upstream contract tests failed in the daily run.\n\n` +
              `Likely BNM or data.gov.my changed a response shape. ` +
              `See workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['contract-drift', 'priority:high']
            });
